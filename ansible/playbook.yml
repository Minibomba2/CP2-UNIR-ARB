---
- name: Deploy vm-web container on Azure VM with Podman
  hosts: vm
  become: true
  vars_files:
    - vars.yml
  vars:
    vm_web_image: "{{ acr_login_server }}/vm-web:casopractico2"
    vm_web_container_name: "vm-web"

  tasks:
    - name: Install Podman
      ansible.builtin.apt:
        name: podman
        state: present
        update_cache: true

    - name: Login to ACR with Podman
      containers.podman.podman_login:
        registry: "{{ acr_login_server }}"
        username: "{{ acr_username }}"
        password: "{{ acr_password }}"

    - name: Pull vm-web image from ACR
      containers.podman.podman_image:
        name: "{{ vm_web_image }}"
        pull: true

    - name: Ensure old container is absent
      containers.podman.podman_container:
        name: "{{ vm_web_container_name }}"
        state: absent

    - name: Run vm-web container
      containers.podman.podman_container:
        name: "{{ vm_web_container_name }}"
        image: "{{ vm_web_image }}"
        state: started
        recreate: true
        network: host

    - name: Generate systemd unit for vm-web container
      ansible.builtin.command:
        cmd: >
          podman generate systemd --name {{ vm_web_container_name }} --files --new
        chdir: /home/cp2-user
      changed_when: true

    - name: Copy systemd unit to system directory
      ansible.builtin.copy:
        src: "/home/cp2-user/container-{{ vm_web_container_name }}.service"
        dest: "/etc/systemd/system/container-{{ vm_web_container_name }}.service"
        remote_src: true
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start vm-web service
      ansible.builtin.systemd:
        name: "container-{{ vm_web_container_name }}.service"
        enabled: true
        state: started

- name: Deploy application on AKS
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars.yml
  vars:
    k8s_namespace: "cp2"

  tasks:
    - name: Ensure cp2 namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ k8s_namespace }}"

    - name: Create ACR secret in AKS
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: acr-secret
            namespace: "{{ k8s_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ {'auths': {acr_login_server: {'username': acr_username, 'password': acr_password, 'auth': (acr_username + ':' + acr_password) | b64encode }}} | to_json | b64encode }}"

    - name: Apply PVC
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../k8s/pvc.yaml"

    - name: Apply deployment
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../k8s/deployment.yaml"

    - name: Apply service
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../k8s/service.yaml"
